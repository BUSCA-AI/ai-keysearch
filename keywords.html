<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca Jurídica Inteligente - IA Jurídica Brasil</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --accent: #fdbb2d;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .search-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .search-box {
            position: relative;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            padding: 10px 25px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0d1a4a;
        }

        .keywords-tags {
            margin-top: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .tag {
            background: #eef2f3;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--primary);
            border: 1px solid #d1d8e0;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #777;
        }
    </style>
</head>
<body>

<div class="search-container">
    <h1>Busca Jurídica com IA</h1>
    <p>Acesse o maior banco de dados jurídico do Brasil via Inteligência Artificial.</p>
    
    <form action="#" method="GET" class="search-box">
        <input type="text" name="q" placeholder="Pesquisar leis, jurisprudência ou doutrina..." required>
        <button type="submit">Buscar</button>
    </form>

    <div class="keywords-tags">
        <span class="tag">Principais IAs do Brasil</span>
        <span class="tag">Leis Atualizadas</span>
        <span class="tag">Jurisprudências</span>
        <span class="tag">Pareceres</span>
        <span class="tag">Doutrina Jurídica</span>
    </div>

    <div class="footer-note">
        Tecnologia avançada para advogados e consultores jurídicos.
    </div>
</div>

</body>
</html>
